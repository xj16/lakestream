# Local end-to-end LakeStream stack: Kafka + MinIO + the streaming job.
# Bring it up with:  docker compose up --build
#
# Then seed some events (from the host, needs a JDK):
#   java -cp target/scala-2.12/lakestream-assembly-0.1.0.jar \
#     dev.xj16.lakestream.tools.EventProducer localhost:9092 events 2000
#
# Inspect the Delta table via the MinIO console at http://localhost:9001
# (minioadmin / minioadmin).

services:
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node (no ZooKeeper).
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot job to create the "lakehouse" bucket MinIO needs.
  minio-init:
    image: minio/mc:RELEASE.2024-06-07T15-04-15Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/lakehouse &&
      echo 'bucket ready';
      "

  lakestream:
    build: .
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPARK_MASTER: "local[*]"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC: "events"
      KAFKA_STARTING_OFFSETS: "earliest"
      STORAGE_BASE_PATH: "s3a://lakehouse/delta"
      STORAGE_CHECKPOINT_PATH: "s3a://lakehouse/_checkpoints"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_PATH_STYLE_ACCESS: "true"
      STREAM_TRIGGER_INTERVAL: "10 seconds"
