# Local end-to-end LakeStream stack: Kafka + MinIO + the streaming job.
#
#   docker compose up --build                 # core stack only
#   docker compose --profile demo up --build  # + auto-seed 2000 events, then verify
#
# The `demo` profile makes the stack self-populating: a one-shot `producer`
# publishes 2000 events (~10% duplicate ids) and a `verify` job then asserts
# that the Delta table row count equals the number of distinct event ids,
# printing PASS/FAIL — no manual steps, no eyeballing the MinIO console.
#
# Inspect the Delta table via the MinIO console at http://localhost:9001
# (minioadmin / minioadmin), or the job's metrics at http://localhost:9464/metrics.

services:
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      # KRaft single-node (no ZooKeeper).
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot job to create the "lakehouse" bucket MinIO needs.
  minio-init:
    image: minio/mc:RELEASE.2024-06-07T15-04-15Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/lakehouse &&
      echo 'bucket ready';
      "

  lakestream:
    build: .
    ports:
      - "9464:9464" # metrics/health: /healthz /readyz /metrics
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPARK_MASTER: "local[*]"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      KAFKA_TOPIC: "events"
      KAFKA_STARTING_OFFSETS: "earliest"
      STORAGE_BASE_PATH: "s3a://lakehouse/delta"
      STORAGE_CHECKPOINT_PATH: "s3a://lakehouse/_checkpoints"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_PATH_STYLE_ACCESS: "true"
      STREAM_TRIGGER_INTERVAL: "5 seconds"
      METRICS_ENABLED: "true"
      METRICS_PORT: "9464"
      DLQ_ENABLED: "true"
      MAINTENANCE_ENABLED: "true"
      MAINTENANCE_EVERY_BATCHES: "20"

  # ---- demo profile: self-seeding + verification -------------------------
  # `docker compose --profile demo up --build`

  # Publishes 2000 synthetic events (~10% duplicate ids) once Kafka is up.
  producer:
    profiles: ["demo"]
    build: .
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'java -cp /opt/lakestream/app.jar
         dev.xj16.lakestream.tools.EventProducer kafka:9092 events 2000 0.1'

  # Waits for the pipeline to catch up, then asserts count == distinct(eventId).
  # Exits non-zero (failing the profile) if exactly-once ever regresses.
  verify:
    profiles: ["demo"]
    build: .
    depends_on:
      producer:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    environment:
      SPARK_MASTER: "local[*]"
      MAIN_CLASS: "dev.xj16.lakestream.tools.DeltaVerify"
      STORAGE_BASE_PATH: "s3a://lakehouse/delta"
      STORAGE_CHECKPOINT_PATH: "s3a://lakehouse/_checkpoints"
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_PATH_STYLE_ACCESS: "true"
    # Give the streaming job time to consume the 2000 events before verifying.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'echo "waiting for the pipeline to consume events..."; sleep 45;
         /opt/lakestream/entrypoint.sh'
