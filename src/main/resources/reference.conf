# Default LakeStream configuration. Every value is overridable via an
# environment variable so the same JAR runs unchanged across local / Docker /
# Kubernetes. `application.conf` (if present) is layered on top of this file.

kafka {
  bootstrap-servers      = "localhost:9092"
  bootstrap-servers      = ${?KAFKA_BOOTSTRAP_SERVERS}
  topic                  = "events"
  topic                  = ${?KAFKA_TOPIC}
  starting-offsets       = "earliest"
  starting-offsets       = ${?KAFKA_STARTING_OFFSETS}
  max-offsets-per-trigger = 100000
  max-offsets-per-trigger = ${?KAFKA_MAX_OFFSETS_PER_TRIGGER}
  fail-on-data-loss      = false
  fail-on-data-loss      = ${?KAFKA_FAIL_ON_DATA_LOSS}
}

storage {
  # s3a://... for MinIO/S3, or a local path (file:///...) for single-node dev.
  base-path            = "s3a://lakehouse/delta"
  base-path            = ${?STORAGE_BASE_PATH}
  table-name           = "events"
  table-name           = ${?STORAGE_TABLE_NAME}
  checkpoint-path      = "s3a://lakehouse/_checkpoints"
  checkpoint-path      = ${?STORAGE_CHECKPOINT_PATH}

  endpoint             = "http://localhost:9000"
  endpoint             = ${?S3_ENDPOINT}
  access-key           = "minioadmin"
  access-key           = ${?S3_ACCESS_KEY}
  secret-key           = "minioadmin"
  secret-key           = ${?S3_SECRET_KEY}
  path-style-access    = true
  path-style-access    = ${?S3_PATH_STYLE_ACCESS}
}

stream {
  trigger-interval   = "10 seconds"
  trigger-interval   = ${?STREAM_TRIGGER_INTERVAL}
  output-mode        = "append"
  output-mode        = ${?STREAM_OUTPUT_MODE}
  shuffle-partitions = 8
  shuffle-partitions = ${?STREAM_SHUFFLE_PARTITIONS}
  once               = false
  once               = ${?STREAM_ONCE}
}

# Dead-letter queue: when enabled, records that fail to parse (no valid
# business key) are written to a second Delta table instead of dropped, so
# data-quality problems are observable rather than invisible.
dlq {
  enabled    = false
  enabled    = ${?DLQ_ENABLED}
  table-name = "events_dlq"
  table-name = ${?DLQ_TABLE_NAME}
}

# Delta table maintenance to counter the streaming small-files problem.
# Runs OPTIMIZE (+ ZORDER) and VACUUM every `every-batches` micro-batches.
maintenance {
  enabled                = false
  enabled                = ${?MAINTENANCE_ENABLED}
  every-batches          = 50
  every-batches          = ${?MAINTENANCE_EVERY_BATCHES}
  zorder-column          = "eventId"
  zorder-column          = ${?MAINTENANCE_ZORDER_COLUMN}
  vacuum-retention-hours = 168
  vacuum-retention-hours = ${?MAINTENANCE_VACUUM_RETENTION_HOURS}
}

# Embedded HTTP server for k8s probes (/healthz, /readyz) and Prometheus
# scraping (/metrics). No heavyweight metrics library — just the JDK.
metrics {
  enabled = false
  enabled = ${?METRICS_ENABLED}
  port    = 9464
  port    = ${?METRICS_PORT}
}
