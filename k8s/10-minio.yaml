apiVersion: v1
kind: Secret
metadata:
  name: minio-creds
  namespace: lakestream
type: Opaque
stringData:
  access-key: minioadmin
  secret-key: minioadmin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: lakestream
  labels: { app: minio }
spec:
  replicas: 1
  selector:
    matchLabels: { app: minio }
  template:
    metadata:
      labels: { app: minio }
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-06-04T19-20-08Z
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              valueFrom: { secretKeyRef: { name: minio-creds, key: access-key } }
            - name: MINIO_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: minio-creds, key: secret-key } }
          ports:
            - { containerPort: 9000, name: s3 }
            - { containerPort: 9001, name: console }
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: lakestream
spec:
  type: NodePort
  selector: { app: minio }
  ports:
    - { name: s3, port: 9000, targetPort: 9000, nodePort: 30900 }
    - { name: console, port: 9001, targetPort: 9001, nodePort: 30901 }
---
# One-shot Job to create the "lakehouse" bucket.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-mkbucket
  namespace: lakestream
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-06-07T15-04-15Z
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "waiting for minio..."; sleep 3;
              done
              mc mb --ignore-existing local/lakehouse
              echo "bucket ready"
