# Single-node Kafka (KRaft mode, no ZooKeeper) for the local kind cluster.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: lakestream
  labels: { app: kafka }
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:3.7
          ports:
            - { containerPort: 9092, name: client }
            - { containerPort: 9093, name: controller }
          env:
            - { name: KAFKA_CFG_NODE_ID, value: "0" }
            - { name: KAFKA_CFG_PROCESS_ROLES, value: "controller,broker" }
            - { name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS, value: "0@kafka-0.kafka:9093" }
            - { name: KAFKA_CFG_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_CFG_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka-0.kafka.lakestream.svc.cluster.local:9092" }
            - { name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            - { name: ALLOW_PLAINTEXT_LISTENER, value: "yes" }
          readinessProbe:
            exec:
              command: ["sh", "-c", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: lakestream
spec:
  clusterIP: None   # headless, for the StatefulSet DNS name
  selector: { app: kafka }
  ports:
    - { name: client, port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
