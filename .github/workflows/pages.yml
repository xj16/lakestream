name: Deploy demo to GitHub Pages

# Publishes the self-contained interactive demo under /demo to GitHub Pages.
# The demo has no build step and no dependencies — it is copied as-is.

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ONE-TIME SETUP: in repo Settings → Pages, set
      # "Build and deployment" → Source: "GitHub Actions". After that, every
      # push touching demo/** publishes automatically to
      # https://xj16.github.io/lakestream/ .
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload demo artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
