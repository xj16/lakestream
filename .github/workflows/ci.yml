name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & test (Scala 2.12 / Spark 3.5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: sbt

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      # Non-blocking style check: report diffs but don't fail the build on
      # formatting alone. Run `sbt scalafmtAll` locally to auto-fix.
      - name: Check formatting
        run: sbt scalafmtCheckAll
        continue-on-error: true

      - name: Compile
        run: sbt compile

      - name: Run tests with coverage
        run: sbt coverage test coverageReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/scala-2.12/coverage-report/cobertura.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/scala-2.12/scoverage-report/
          if-no-files-found: warn

      - name: Assemble fat JAR
        run: sbt assembly

      - name: Upload assembly artifact
        uses: actions/upload-artifact@v4
        with:
          name: lakestream-assembly
          path: target/scala-2.12/lakestream-assembly-*.jar
          if-no-files-found: error

  docker:
    name: docker image builds
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: lakestream:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  k8s-validate:
    name: validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate manifests
        run: |
          kubeconform -strict -summary \
            -schema-location default \
            -ignore-missing-schemas \
            k8s/*.yaml
